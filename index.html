<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TON Transfer</title>
  <script src="https://unpkg.com/@tonconnect/ui@2.0.8/dist/tonconnect-ui.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #04080f; --surface: #0c1220; --border: #1a2640;
      --ton: #0098ea; --ton-glow: rgba(0,152,234,0.18);
      --text: #e8f1ff; --muted: #5a7a9a; --success: #00d97e; --error: #ff4d6d;
      --mono: 'DM Mono', monospace; --display: 'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,152,234,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,152,234,0.04) 1px, transparent 1px); background-size: 40px 40px; animation: gridDrift 20s linear infinite; pointer-events: none; z-index: 0; }
    @keyframes gridDrift { 0% { transform: translateY(0); } 100% { transform: translateY(40px); } }
    .container { position: relative; z-index: 1; width: 100%; max-width: 480px; padding: 24px 16px; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(32px); } to { opacity: 1; transform: translateY(0); } }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .ton-logo { width: 40px; height: 40px; background: var(--ton); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--display); font-weight: 800; font-size: 16px; color: #fff; box-shadow: 0 0 24px var(--ton-glow); flex-shrink: 0; }
    .header-text h1 { font-family: var(--display); font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .header-text p { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
    #connect-btn-wrap { display: flex; justify-content: flex-end; margin-left: auto; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--ton), transparent); opacity: 0.5; }
    .wallet-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); margin-bottom: 20px; }
    .wallet-status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .wallet-status.connected .dot { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .wallet-status.connected { color: var(--success); }
    .send-btn { width: 100%; background: var(--ton); color: #fff; border: none; border-radius: 12px; padding: 16px; font-family: var(--display); font-size: 15px; font-weight: 800; letter-spacing: 0.03em; cursor: pointer; position: relative; overflow: hidden; transition: background 0.2s, transform 0.1s, box-shadow 0.2s; box-shadow: 0 4px 24px rgba(0,152,234,0.35); }
    .send-btn:hover { background: #00aaff; box-shadow: 0 6px 32px rgba(0,152,234,0.5); transform: translateY(-1px); }
    .send-btn:active { transform: translateY(0); }
    .send-btn .btn-shine { position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); animation: shine 3s infinite; }
    @keyframes shine { 0% { left: -100%; } 30%, 100% { left: 150%; } }
    .toast { margin-top: 16px; padding: 14px 16px; border-radius: 10px; font-size: 12px; line-height: 1.5; display: none; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .toast.success { display: block; background: rgba(0,217,126,0.1); border: 1px solid rgba(0,217,126,0.3); color: var(--success); }
    .toast.error   { display: block; background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3); color: var(--error); }
    .toast.info    { display: block; background: rgba(0,152,234,0.1);  border: 1px solid rgba(0,152,234,0.3);  color: var(--ton); }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="ton-logo">TON</div>
    <div class="header-text">
      <h1>TON Transfer</h1>
      <p>Mainnet · TonConnect 2.0</p>
    </div>
    <div id="connect-btn-wrap"></div>
  </div>
  <div class="card">
    <div class="wallet-status" id="walletStatus">
      <span class="dot"></span>
      <span id="walletStatusText">Wallet not connected</span>
    </div>
    <button class="send-btn" id="sendBtn">
      <span class="btn-shine"></span>
      Coonect Wallet
    </button>
    <div class="toast" id="toast"></div>
  </div>
</div>

<script>
  //params from mini app
  const params  = new URLSearchParams(location.search);
  const toAddr  = params.get('to')      || '';
  const amount  = params.get('amount')  || '';
  const comment = params.get('comment') || '';

  const tc = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://raw.githubusercontent.com/Michaelzy27/Soundrig-Ton-Manifest/main/tonconnect-manifest.json',
    buttonRootId: 'connect-btn-wrap',
  });

  function showToast(msg, type = 'info') {
    const t = document.getElementById('toast');
    t.className = 'toast ' + type;
    t.innerHTML = msg;
  }

  function encodeTextComment(text) {
    if (!text) return undefined;
    const enc = new TextEncoder().encode(text);
    const buf = new Uint8Array(4 + enc.length); // 4 zero bytes = OP 0x00000000
    buf.set(enc, 4);
    return btoa(String.fromCharCode(...buf));
  }

  function setBtn(label, loading = false) {
    const btn = document.getElementById('sendBtn');
    btn.innerHTML = loading
      ? '<span class="btn-shine"></span><span class="spinner"></span>' + label
      : '<span class="btn-shine"></span>' + label;
  }

  // ── Wallet status tracking ────────────────────────────────────────────────
  let isConnected = false;
  const statusWrap = document.getElementById('walletStatus');
  const statusText = document.getElementById('walletStatusText');

  tc.onStatusChange(wallet => {
    isConnected = !!wallet;
    if (wallet) {
      const addr = wallet.account.address;
      statusText.textContent = 'Connected: ' + addr.slice(0,6) + '...' + addr.slice(-4);
      statusWrap.classList.add('connected');
    } else {
      statusText.textContent = 'Wallet not connected';
      statusWrap.classList.remove('connected');
      setBtn('Send Transaction');
    }
  });

  // ── Send transaction ──────────────────────────────────────────────────────
  async function sendTx() {
    if (!toAddr || !amount || isNaN(parseFloat(amount))) {
      showToast('Missing to/amount parameters in URL.', 'error');
      return;
    }

    setBtn('Awaiting wallet...', true);
    showToast('Opening wallet — please confirm…', 'info');

    const nanoAmount = (BigInt(Math.round(parseFloat(amount) * 1e9))).toString();
    const message = { address: toAddr, amount: nanoAmount };
    const payload = encodeTextComment(comment);
    if (payload) message.payload = payload;

    try {
      const result = await tc.sendTransaction({
        validUntil: Math.floor(Date.now() / 1000) + 300,
        messages: [message],
      });
      showToast('&#10003; Transaction sent!<br/><span style="opacity:.6;font-size:10px;word-break:break-all">BOC: ' + result.boc.slice(0,40) + '...</span>', 'success');
      setBtn('Send Transaction');
    } catch (err) {
      const msg = err?.message || String(err);
      showToast('Error: ' + (msg.includes('reject') || msg.includes('cancel') ? 'Transaction cancelled.' : msg), 'error');
      setBtn('Send Transaction');
    }
  }

  // ── Button click: connect if needed, then send ────────────────────────────
  document.getElementById('sendBtn').addEventListener('click', async () => {
    if (!isConnected) {
      // Not connected — open modal, then send once connected
      showToast('Please connect your wallet first.', 'info');
      await tc.openModal();

      // // Wait for connection then send
      // const unsub = tc.onStatusChange(async wallet => {
      //   if (wallet) {
      //     unsub(); // unsubscribe after first connect
      //     await sendTx();
      //   }
      // });
    } 
    // else {
    //   // Already connected — send immediately
    //   await sendTx();
    // }
  });
</script>
</body>
</html>
